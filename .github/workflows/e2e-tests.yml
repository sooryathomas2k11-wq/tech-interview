name: E2E Tests
on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'timezone-app/**'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timezone-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: timezone-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: timezone-app/playwright-report/
          retention-days: 30
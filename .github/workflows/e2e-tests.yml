name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'e2e/**'
      - 'app/**'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'e2e/**'
      - 'app/**'
      - 'package.json'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timezone-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run e2e tests
        run: npm run e2e

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

name: CI
on:
  push:
    branches: [ main, develop]
  pull_request:
    branches: [ main, de ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # This clears the Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Explicitly using Node 24
          cache: 'npm'
          cache-dependency-path: timezone-app/package.json

      - name: Install dependencies
        run: npm install
        working-directory: timezone-app

      # This fixes the "Headless Shell" / Browser missing error
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: timezone-app

      # Starts the app, waits for it to be ready, then runs tests
      - name: Run Playwright tests
        run: |
          npm run start & 
          npx playwright wait-on http://localhost:3000 --timeout 60000
          npx playwright test
        working-directory: timezone-app

      # Fixes the "No files found" warning for reports
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: timezone-app/playwright-report/
          retention-days: 30